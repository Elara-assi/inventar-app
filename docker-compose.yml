services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: inventar
      POSTGRES_USER: inventar
      POSTGRES_PASSWORD: inventar
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./db/migrations/002_export_scope.sql:/docker-entrypoint-initdb.d/002_export_scope.sql:ro
      - ./db/migrations/003_ai_learning_examples.sql:/docker-entrypoint-initdb.d/003_ai_learning_examples.sql:ro
      - ./db/migrations/004_bga_capture.sql:/docker-entrypoint-initdb.d/004_bga_capture.sql:ro
      - ./db/migrations/005_tires_wheels.sql:/docker-entrypoint-initdb.d/005_tires_wheels.sql:ro
      - ./db/migrations/006_session_inventory_type.sql:/docker-entrypoint-initdb.d/006_session_inventory_type.sql:ro
      - ./db/migrations/007_offline_queue_ids.sql:/docker-entrypoint-initdb.d/007_offline_queue_ids.sql:ro
      - ./db/migrations/008_enterprise_foundation.sql:/docker-entrypoint-initdb.d/008_enterprise_foundation.sql:ro
      - ./db/migrations/013_dictation.sql:/docker-entrypoint-initdb.d/013_dictation.sql:ro
      - ./db/seeds/001_seed.sql:/docker-entrypoint-initdb.d/999_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventar -d inventar"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8-alpine
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.18.2
    restart: unless-stopped
    environment:
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://inventar:inventar@inventar-app-postgres-1:5432/inventar
      UPLOAD_ROOT: /opt/inventar/uploads
      APP_ORIGIN: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3002,https://inventar.elarahub.cloud
      AUTH_SECRET: ${AUTH_SECRET:-change-me-local}
      MIGRATIONS_PATH: /app/db/migrations
      MAX_UPLOAD_BYTES: 36700160
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_LOCAL_URL: ${OLLAMA_LOCAL_URL:-http://ollama:11434}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3-vl:235b-cloud}
      OLLAMA_VISION_MODEL: ${OLLAMA_VISION_MODEL:-qwen3-vl:235b-cloud}
      OLLAMA_OCR_MODEL: ${OLLAMA_OCR_MODEL:-glm-ocr:latest}
      OLLAMA_FALLBACK_MODEL: ${OLLAMA_FALLBACK_MODEL:-gemma4:31b-cloud}
      OLLAMA_TIMEOUT_SECONDS: 120
      SEARCH_PROVIDER: ${SEARCH_PROVIDER:-searxng}
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://searxng-fe55-searxng-1:8080}
      SEARCH_TIMEOUT_SECONDS: ${SEARCH_TIMEOUT_SECONDS:-10}
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api/app:/app/app
      - ./storage/uploads:/opt/inventar/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_started
    networks:
      - default
      - elara

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
        NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-unbekannt}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-unbekannt}
    ports:
      - "3002:3000"
    depends_on:
      - api

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://inventar:inventar@inventar-app-postgres-1:5432/inventar
      UPLOAD_ROOT: /opt/inventar/uploads
      AUTH_SECRET: ${AUTH_SECRET:-change-me-local}
      MIGRATIONS_PATH: /app/db/migrations
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
      WHISPER_MODEL_DIR: /opt/inventar/models
      REDIS_URL: redis://inventar-app-redis-1:6379/0
      LITELLM_URL: http://litellm:4000
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_LOCAL_URL: ${OLLAMA_LOCAL_URL:-http://ollama:11434}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3-vl:235b-cloud}
      OLLAMA_VISION_MODEL: ${OLLAMA_VISION_MODEL:-qwen3-vl:235b-cloud}
      OLLAMA_OCR_MODEL: ${OLLAMA_OCR_MODEL:-glm-ocr:latest}
      OLLAMA_FALLBACK_MODEL: ${OLLAMA_FALLBACK_MODEL:-gemma4:31b-cloud}
      OLLAMA_TIMEOUT_SECONDS: 120
      SEARCH_PROVIDER: ${SEARCH_PROVIDER:-searxng}
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://searxng-fe55-searxng-1:8080}
      SEARCH_TIMEOUT_SECONDS: ${SEARCH_TIMEOUT_SECONDS:-10}
    volumes:
      - ./apps/api/app:/app/app
      - ./storage/uploads:/opt/inventar/uploads
      - whisper-models:/opt/inventar/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_started
    networks:
      - default
      - elara

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    profiles: ["ai"]
    environment:
      LITELLM_MASTER_KEY: change-me-local
    ports:
      - "4000:4000"

  uptime-kuma:
    image: louislam/uptime-kuma:1
    profiles: ["ops"]
    ports:
      - "3001:3001"
    volumes:
      - uptime-kuma-data:/app/data

volumes:
  whisper-models:
  postgres-data:
  ollama-data:
  uptime-kuma-data:

networks:
  elara:
    external: true
    name: ELARA
