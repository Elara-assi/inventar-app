services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: inventar
      POSTGRES_USER: inventar
      POSTGRES_PASSWORD: inventar
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./db/migrations/002_stability.sql:/docker-entrypoint-initdb.d/002_stability.sql:ro
      - ./db/migrations/003_offline_dictation.sql:/docker-entrypoint-initdb.d/003_offline_dictation.sql:ro
      - ./db/seeds/001_seed.sql:/docker-entrypoint-initdb.d/004_seed.sql:ro
      - ./db/seeds/002_brand_lexicon.sql:/docker-entrypoint-initdb.d/005_brand_lexicon.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventar -d inventar"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8-alpine

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: api
    environment:
      DATABASE_URL: postgresql://inventar:inventar@postgres:5432/inventar
      UPLOAD_ROOT: /opt/inventar/uploads
      APP_ORIGIN: ${APP_ORIGIN:-http://localhost:3000}
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api/app:/app/app
      - ./storage/uploads:/opt/inventar/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      # Auf dem VPS auf die oeffentliche API-Adresse setzen (z. B. https://inventar-api.example.de)
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3002:3000"
    volumes:
      - ./apps/web:/app/apps/web
    depends_on:
      - api

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: worker
    environment:
      DATABASE_URL: postgresql://inventar:inventar@postgres:5432/inventar
      UPLOAD_ROOT: /opt/inventar/uploads
      REDIS_URL: redis://redis:6379/0
      LITELLM_URL: http://litellm:4000
      WHISPER_MODEL: small
      WHISPER_MODEL_DIR: /opt/inventar/models
    volumes:
      - ./apps/api/app:/app/app
      - ./storage/uploads:/opt/inventar/uploads
      - whisper-models:/opt/inventar/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    profiles: ["ai"]
    environment:
      LITELLM_MASTER_KEY: change-me-local
    ports:
      - "4000:4000"

  uptime-kuma:
    image: louislam/uptime-kuma:1
    profiles: ["ops"]
    ports:
      - "3001:3001"
    volumes:
      - uptime-kuma-data:/app/data

volumes:
  postgres-data:
  uptime-kuma-data:
  whisper-models:
