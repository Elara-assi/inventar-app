services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: inventar
      POSTGRES_USER: inventar
      POSTGRES_PASSWORD: inventar
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./db/migrations/002_export_scope.sql:/docker-entrypoint-initdb.d/002_export_scope.sql:ro
      - ./db/migrations/003_ai_learning_examples.sql:/docker-entrypoint-initdb.d/003_ai_learning_examples.sql:ro
      - ./db/seeds/001_seed.sql:/docker-entrypoint-initdb.d/004_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventar -d inventar"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8-alpine

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://inventar:inventar@inventar-app-postgres-1:5432/inventar
      UPLOAD_ROOT: /opt/inventar/uploads
      APP_ORIGIN: http://localhost:3000
      OLLAMA_URL: http://ollama-k0rw-ollama-1:11434
      OLLAMA_MODEL: gemma4:31b-cloud
      OLLAMA_TIMEOUT_SECONDS: 120
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api/app:/app/app
      - ./storage/uploads:/opt/inventar/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - default
      - elara

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://inventar-api.elarahub.cloud
    environment:
      NEXT_PUBLIC_API_URL: https://inventar-api.elarahub.cloud
    ports:
      - "3002:3000"
    depends_on:
      - api

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["python", "-m", "app.worker"]
    environment:
      DATABASE_URL: postgresql://inventar:inventar@inventar-app-postgres-1:5432/inventar
      UPLOAD_ROOT: /opt/inventar/uploads
      REDIS_URL: redis://inventar-app-redis-1:6379/0
      LITELLM_URL: http://litellm:4000
      OLLAMA_URL: http://ollama-k0rw-ollama-1:11434
      OLLAMA_MODEL: gemma4:31b-cloud
      OLLAMA_TIMEOUT_SECONDS: 120
    volumes:
      - ./apps/api/app:/app/app
      - ./storage/uploads:/opt/inventar/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - default
      - elara

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    profiles: ["ai"]
    environment:
      LITELLM_MASTER_KEY: change-me-local
    ports:
      - "4000:4000"

  uptime-kuma:
    image: louislam/uptime-kuma:1
    profiles: ["ops"]
    ports:
      - "3001:3001"
    volumes:
      - uptime-kuma-data:/app/data

volumes:
  postgres-data:
  uptime-kuma-data:

networks:
  elara:
    external: true
    name: ELARA
