<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inventar Maschine – offline</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; background: #f4f6f7; color: #172026;
           display: grid; place-items: center; min-height: 100vh; margin: 0; padding: 20px; }
    .box { background: white; border: 1px solid #d9e0e4; border-radius: 8px; padding: 24px; max-width: 420px; }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p { color: #60717d; margin: 0 0 16px; }
    a { display: inline-block; background: #26343c; color: white; font-weight: 800;
        padding: 12px 18px; border-radius: 8px; text-decoration: none; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Diese Seite ist offline nicht verfuegbar</h1>
    <p>Die Erfassungsseite funktioniert offline, sobald sie einmal geoeffnet wurde.
       Bereits erfasste Objekte sind lokal gesichert und werden automatisch uebertragen,
       sobald wieder Netz da ist.</p>
    <a href="javascript:location.reload()">Erneut versuchen</a>
  </div>
</body>
</html>
